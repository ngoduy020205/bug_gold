<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Mua Gói - VIP</title>
    <style>
        body { background: #121212; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; border: 1px solid #333; max-width: 400px; width: 100%; }
        h2 { color: #fff; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; }
        input { width: 100%; box-sizing: border-box; margin: 10px 0; padding: 12px; background: #000; color: #0f0; border: 1px solid #444; font-size: 16px; font-family: monospace; }
        button { width: 100%; padding: 15px; background: #006600; color: #fff; border: none; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; }
        button:hover { background: #008800; }
        #status { margin-top: 20px; font-size: 14px; text-align: left; height: 150px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🛠️ AUTO BUY GOLD</h2>
        <input type="text" id="name" placeholder="Tên nhân vật" value="acechuon93">
        <input type="text" id="role" placeholder="Role ID" value="281">
        <input type="text" id="server" placeholder="Số Server (VD: 36)" value="36">
        <input type="number" id="num" placeholder="Số lượng gói" value="100">
        <button onclick="chayTool()" id="btnStart">BẮT ĐẦU MUA</button>
        <div id="status"></div>
    </div>

    <script>
        async function chayTool() {
            const name = document.getElementById('name').value;
            const role = document.getElementById('role').value;
            const srv = document.getElementById('server').value;
            const num = document.getElementById('num').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btnStart');
            
            // Link Render đã được ráp chuẩn
            const proxyUrl = "https://bug-gold.onrender.com/buy";

            btn.disabled = true;
            status.innerHTML = "<p style='color:yellow'>Đang chạy... vui lòng không tắt web</p>";
            
            for(let i = 1; i <= num; i++) {
                try {
                    const res = await fetch(`${proxyUrl}?srv_id=local_${srv}&role_id=${role}&name=${name}`);
                    const text = await res.text();
                    status.innerHTML += `<p>[${i}/${num}] OK: ${text}</p>`;
                } catch(e) {
                    status.innerHTML += `<p style='color:red'>[${i}/${num}] Lỗi kết nối Server!</p>`;
                }
                status.scrollTop = status.scrollHeight;
                await new Promise(r => setTimeout(r, 500)); // Nghỉ 0.5s giữa các lần mua
            }
            status.innerHTML += "<p style='color:lime'>=== HOÀN TẤT ===</p>";
            btn.disabled = false;
        }
    </script>
</body>
</html>
