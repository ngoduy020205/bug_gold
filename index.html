<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto Tool System</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-panel: #141414;
            --border-normal: #333;
            --border-focus: #007acc;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #007acc;
            --accent-hover: #005f9e;
            --success: #4CAF50;
            --error: #f44336;
            --char-color: #9c27b0;
            --char-bg: rgba(156, 39, 176, 0.1);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-normal);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            align-self: flex-start;
            margin-top: 2vh;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-normal);
            padding-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border-normal);
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            text-align: center;
            font-weight: bold;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* LƯỚI CHỌN CHUNG */
        .grid-layout {
            display: grid;
            gap: 10px;
        }
        
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }

        .select-item {
            background: var(--bg-body);
            border: 1px solid var(--border-normal);
            border-radius: 4px;
            padding: 14px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .select-item:hover { border-color: #555; }

        /* Nút Gói Quà */
        .pkg-item.active {
            border-color: var(--accent);
            background: rgba(0, 122, 204, 0.1);
            color: var(--accent);
        }

        /* Nút Nhân Vật */
        .char-item.active {
            border-color: var(--char-color);
            background: var(--char-bg);
            color: var(--char-color);
        }

        /* MENU XỔ XUỐNG (DROPDOWN) */
        .dropdown-header {
            background: var(--bg-body);
            border: 1px solid var(--border-normal);
            padding: 12px 15px;
            border-radius: 4px;
            margin-top: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            user-select: none;
            transition: all 0.2s ease;
        }

        .dropdown-header:hover { border-color: #555; }
        .dropdown-header.open {
            border-color: var(--accent);
            color: var(--accent);
        }

        button.action-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            margin-top: 5px;
        }

        button.action-btn:hover { background: var(--accent-hover); }
        button.action-btn:disabled { background: var(--border-normal); color: var(--text-muted); cursor: not-allowed; }

        .log-box {
            margin-top: 20px;
            background: var(--bg-body);
            border: 1px solid var(--border-normal);
            border-radius: 4px;
            height: 180px;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-row { margin-bottom: 4px; border-bottom: 1px solid #1a1a1a; padding-bottom: 4px; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .log-sys { color: var(--text-muted); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        @media (max-width: 400px) {
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="panel">
    <h2>Auto Buy System</h2>
    
    <div class="form-group">
        <label>1. Chọn Nhân Vật</label>
        <div class="grid-layout grid-2" id="characterGrid">
            <div class="select-item char-item" data-user="acechuon93" data-role="281" data-name="SoiCoDoc" onclick="selectCharacter(this)">SoiCoDoc</div>
            <div class="select-item char-item" data-user="Dyydzct6m" data-role="200" data-name="Dyydzct6m" onclick="selectCharacter(this)">Dyydzct6m</div>
            <div class="select-item char-item" data-user="phongvu37gk" data-role="17" data-name="TobyRyan" onclick="selectCharacter(this)">TobyRyan</div>
            <div class="select-item char-item" data-user="lequynhan" data-role="150" data-name="Gojo" onclick="selectCharacter(this)">Gojo</div>
        </div>
    </div>

    <div class="form-group">
        <label>2. Chọn Gói Nạp (Chỉ 1 gói)</label>
        
        <div class="grid-layout grid-3" id="packageGrid">
            <div class="select-item pkg-item" data-id="7" onclick="selectPackage(this)">Gói Vàng</div>
            <div class="select-item pkg-item" data-id="904" onclick="selectPackage(this)">Lễ 100K</div>
            <div class="select-item pkg-item" data-id="907" onclick="selectPackage(this)">Lễ 1M</div>
            <div class="select-item pkg-item" data-id="908" onclick="selectPackage(this)">Lễ 2M</div>
            <div class="select-item pkg-item" data-id="705" onclick="selectPackage(this)">Lễ 5M</div>
        </div>

        <div class="dropdown-header" id="weeklyMenuBtn" onclick="toggleWeekly()">
            <span>GÓI TUẦN (Mở rộng)</span>
            <span id="weeklyIcon">▼</span>
        </div>

        <div class="grid-layout grid-3" id="weeklyPackages" style="display: none; margin-top: 10px;">
            <div class="select-item pkg-item" data-id="401" onclick="selectPackage(this)">Tuần 10K</div>
            <div class="select-item pkg-item" data-id="402" onclick="selectPackage(this)">Tuần 20K</div>
            <div class="select-item pkg-item" data-id="403" onclick="selectPackage(this)">Tuần 50K</div>
            <div class="select-item pkg-item" data-id="404" onclick="selectPackage(this)">Tuần 100K</div>
            <div class="select-item pkg-item" data-id="405" onclick="selectPackage(this)">Tuần 200K</div>
            <div class="select-item pkg-item" data-id="406" onclick="selectPackage(this)">Tuần 500K</div>
        </div>
    </div>

    <div class="form-group">
        <label>3. Số lượng</label>
        <input type="number" id="num" value="1" min="1" autocomplete="off">
    </div>

    <button onclick="startProcess()" class="action-btn" id="btnAction">Thực Thi Giao Dịch</button>

    <div class="log-box" id="logger">
        <div class="log-sys">System ready. Select target and package...</div>
    </div>
</div>

<script>
    let currentProductId = null;
    let selectedChar = null;

    // Xử lý bật/tắt Menu Gói Tuần
    function toggleWeekly() {
        const grid = document.getElementById('weeklyPackages');
        const icon = document.getElementById('weeklyIcon');
        const btn = document.getElementById('weeklyMenuBtn');
        
        if (grid.style.display === 'none') {
            grid.style.display = 'grid';
            icon.innerText = '▲';
            btn.classList.add('open');
        } else {
            grid.style.display = 'none';
            icon.innerText = '▼';
            btn.classList.remove('open');
        }
    }

    // Xử lý chọn nhân vật
    function selectCharacter(element) {
        document.querySelectorAll('.char-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        
        selectedChar = {
            username: element.getAttribute('data-user'),
            roleId: element.getAttribute('data-role'),
            displayName: element.getAttribute('data-name')
        };
    }

    // Xử lý chọn gói (Logic bao trùm toàn bộ các gói)
    function selectPackage(element) {
        // Dùng querySelectorAll quét SẠCH mọi gói (cả Lễ và Tuần) để xóa class 'active'
        document.querySelectorAll('.pkg-item').forEach(item => item.classList.remove('active'));
        
        // Bật sáng duy nhất gói vừa bấm
        element.classList.add('active');
        currentProductId = element.getAttribute('data-id');
    }

    function addLog(msg, type = 'sys') {
        const logger = document.getElementById('logger');
        const className = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-sys';
        logger.innerHTML += `<div class="log-row ${className}">${msg}</div>`;
        logger.scrollTop = logger.scrollHeight;
    }

    async function startProcess() {
        if (!selectedChar) {
            alert("LỖI: Bạn chưa chọn Nhân vật!");
            return;
        }
        if (!currentProductId) {
            alert("LỖI: Bạn chưa chọn Gói nạp!");
            return;
        }

        const num = parseInt(document.getElementById('num').value) || 1;
        const btn = document.getElementById('btnAction');
        
        // Link Render của bạn (Giữ nguyên)
        const proxyUrl = "https://bug-gold.onrender.com/buy";

        btn.disabled = true;
        btn.innerText = "Đang xử lý...";
        
        document.getElementById('logger').innerHTML = '';
        addLog(`Khởi chạy: Mua ${num} gói cho [${selectedChar.displayName}]`);
        
        for(let i = 1; i <= num; i++) {
            try {
                // Fix cứng local_36 và truyền thông tin qua URL
                const targetUrl = `${proxyUrl}?srv_id=local_36&role_id=${selectedChar.roleId}&name=${selectedChar.username}&productId=${currentProductId}`;
                
                const res = await fetch(targetUrl);
                const text = await res.text();
                
                addLog(`[${i}/${num}] RES: ${text}`, 'success');
            } catch(e) {
                addLog(`[${i}/${num}] ERR: Connection Failed`, 'error');
            }
            
            await new Promise(r => setTimeout(r, 100)); // Delay 100ms
        }
        
        addLog(`Giao dịch hoàn tất.`, 'sys');
        btn.disabled = false;
        btn.innerText = "Thực Thi Giao Dịch";
    }
</script>

</body>
</html>
