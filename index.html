<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto Tool System</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-panel: #141414;
            --border-normal: #333;
            --border-focus: #007acc;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --accent: #007acc;
            --accent-hover: #005f9e;
            --success: #4CAF50;
            --error: #f44336;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-normal);
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            align-self: flex-start;
            margin-top: 2vh;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-normal);
            padding-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: var(--bg-body);
            color: var(--text-main);
            border: 1px solid var(--border-normal);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* KHU VỰC CHỌN GÓI (Đã ẩn ID, căn giữa chữ) */
        .package-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .pkg-item {
            background: var(--bg-body);
            border: 1px solid var(--border-normal);
            border-radius: 4px;
            padding: 14px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pkg-item:hover { border-color: #555; }
        
        .pkg-item.active {
            border-color: var(--accent);
            background: rgba(0, 122, 204, 0.1);
            color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        button:hover { background: var(--accent-hover); }
        button:disabled { background: var(--border-normal); color: var(--text-muted); cursor: not-allowed; }

        .log-box {
            margin-top: 20px;
            background: var(--bg-body);
            border: 1px solid var(--border-normal);
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        .log-row { margin-bottom: 4px; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .log-sys { color: var(--text-muted); }

        /* Responsive cho điện thoại */
        @media (max-width: 400px) {
            .package-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row { flex-direction: column; gap: 0; }
            .form-row .form-group { margin-bottom: 15px; }
        }
    </style>
</head>
<body>

<div class="panel">
    <h2>Auto Buy System</h2>
    
    <div class="form-group">
        <label>Target Name</label>
        <input type="text" id="name" value="acechuon93" autocomplete="off">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Role ID</label>
            <input type="text" id="role" value="281" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Server</label>
            <input type="text" id="server" value="36" autocomplete="off">
        </div>
    </div>

    <div class="form-group">
        <label>Gói Sản Phẩm (Bắt buộc chọn)</label>
        <div class="package-grid" id="packageGrid">
            <div class="pkg-item" data-id="7" onclick="selectPackage(this)">Gói Vàng</div>
            <div class="pkg-item" data-id="904" onclick="selectPackage(this)">Lễ 100K</div>
            <div class="pkg-item" data-id="907" onclick="selectPackage(this)">Lễ 1M</div>
            <div class="pkg-item" data-id="908" onclick="selectPackage(this)">Lễ 2M</div>
            <div class="pkg-item" data-id="705" onclick="selectPackage(this)">Lễ 5M</div>
        </div>
    </div>

    <div class="form-group">
        <label>Số lượng</label>
        <input type="number" id="num" value="10" min="1" autocomplete="off">
    </div>

    <button onclick="startProcess()" id="btnAction">Thực Thi</button>

    <div class="log-box" id="logger">
        <div class="log-sys">System initialized. Waiting for input...</div>
    </div>
</div>

<script>
    let currentProductId = null;

    // Hàm xử lý khi bấm chọn gói
    function selectPackage(element) {
        // Xóa class active ở tất cả các gói
        const items = document.querySelectorAll('.pkg-item');
        items.forEach(item => item.classList.remove('active'));
        
        // Thêm class active vào gói được bấm
        element.classList.add('active');
        
        // Lưu lại ID gói ẩn bên dưới lớp HTML
        currentProductId = element.getAttribute('data-id');
    }

    // Hàm in log
    function addLog(msg, type = 'sys') {
        const logger = document.getElementById('logger');
        const className = type === 'success' ? 'log-success' : type === 'error' ? 'log-error' : 'log-sys';
        logger.innerHTML += `<div class="log-row ${className}">${msg}</div>`;
        logger.scrollTop = logger.scrollHeight;
    }

    async function startProcess() {
        if (!currentProductId) {
            alert("LỖI: Bạn chưa chọn gói sản phẩm nào!");
            return;
        }

        const name = document.getElementById('name').value.trim();
        const role = document.getElementById('role').value.trim();
        const srv = document.getElementById('server').value.trim();
        const num = parseInt(document.getElementById('num').value) || 1;
        const btn = document.getElementById('btnAction');
        
        // Link Render của bạn
        const proxyUrl = "https://bug-gold.onrender.com/buy";

        btn.disabled = true;
        btn.innerText = "Đang xử lý...";
        
        document.getElementById('logger').innerHTML = '';
        addLog(`Bắt đầu tiến trình: Mua ${num} gói (ID ẩn: ${currentProductId}) cho [${name}]`);
        
        for(let i = 1; i <= num; i++) {
            try {
                const serverFormat = srv.includes("local_") ? srv : `local_${srv}`;
                
                // Gắn thêm tham số productId vào URL để gửi lên Render
                const targetUrl = `${proxyUrl}?srv_id=${serverFormat}&role_id=${role}&name=${name}&productId=${currentProductId}`;
                
                const res = await fetch(targetUrl);
                const text = await res.text();
                
                addLog(`[${i}/${num}] RES: ${text}`, 'success');
            } catch(e) {
                addLog(`[${i}/${num}] ERR: Connection Failed`, 'error');
            }
            
            await new Promise(r => setTimeout(r, 100)); // Delay 100ms
        }
        
        addLog(`Tiến trình hoàn tất.`, 'sys');
        btn.disabled = false;
        btn.innerText = "Thực Thi";
    }
</script>

</body>
</html>
