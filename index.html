<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Buy Packs - Gunny Tool</title>
    <style>
        body { background-color: #121212; color: #00ff00; font-family: monospace; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        h2 { text-align: center; color: #fff; border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #ccc; }
        input { width: 100%; padding: 8px; margin-top: 5px; background: #000; color: #0f0; border: 1px solid #444; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 12px; background: #006600; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #008800; }
        #logArea { margin-top: 20px; background: #000; height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #444; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ AUTO BUY PACKS</h2>
    
    <label>Tên nhân vật (Name):</label>
    <input type="text" id="txtName" placeholder="VD: acechuon93" value="acechuon93">

    <label>Role ID:</label>
    <input type="number" id="txtRole" placeholder="VD: 281" value="281">

    <label>Server ID:</label>
    <input type="text" id="txtServer" placeholder="VD: 36 (Tự động thêm local_)" value="36">

    <label>Cookie PHPSESSID (Của người dùng):</label>
    <input type="text" id="txtCookie" placeholder="VD: bskoh80nq... (Bắt buộc)">

    <button onclick="startAutoBuy()" id="btnBuy">BẮT ĐẦU MUA (100 GÓI)</button>

    <div id="logArea"></div>
</div>

<script>
    async function startAutoBuy() {
        const name = document.getElementById('txtName').value;
        const role = document.getElementById('txtRole').value;
        let server = document.getElementById('txtServer').value;
        const cookie = document.getElementById('txtCookie').value;
        const logArea = document.getElementById('logArea');
        const btnBuy = document.getElementById('btnBuy');

        if (!cookie) {
            alert("Vui lòng nhập Cookie PHPSESSID!");
            return;
        }

        if (!server.startsWith("local_")) server = "local_" + server;

        btnBuy.disabled = true;
        btnBuy.innerText = "ĐANG CHẠY...";
        logArea.innerHTML = `<p style="color:yellow">Bắt đầu mua cho ${name} ở ${server}...</p>`;

        const baseUrl = "http://nhangiatruyenky.com:126/api.php/pf/sygame/pay_web/";
        const totalPacks = 100;

        for (let i = 1; i <= totalPacks; i++) {
            const params = new URLSearchParams({
                srv_id: server,
                role_id: role,
                money: "1",
                name: name,
                productId: "7"
            });

            try {
                // ĐÂY LÀ CHỖ SẼ BỊ TRÌNH DUYỆT CHẶN (Lỗi CORS / Cookie)
                const response = await fetch(`${baseUrl}?${params.toString()}`, {
                    method: 'GET',
                    headers: {
                        'Accept': '*/*'
                        // Không thể set Header Cookie ở đây bằng JS trình duyệt
                    }
                });

                if (response.ok) {
                    const text = await response.text();
                    logArea.innerHTML += `<p>[${i}/${totalPacks}] OK: ${text}</p>`;
                } else {
                    logArea.innerHTML += `<p style="color:red">[${i}/${totalPacks}] Lỗi HTTP: ${response.status}</p>`;
                }
            } catch (error) {
                logArea.innerHTML += `<p style="color:red">[${i}/${totalPacks}] Lỗi kết nối (Bị trình duyệt chặn CORS/HTTPS): ${error.message}</p>`;
            }

            // Cuộn xuống cuối
            logArea.scrollTop = logArea.scrollHeight;
            
            // Nghỉ 500ms
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        btnBuy.disabled = false;
        btnBuy.innerText = "HOÀN TẤT - MUA LẠI";
        logArea.innerHTML += `<p style="color:lime">=== ĐÃ XONG ===</p>`;
    }
</script>

</body>
</html>
