<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Mua Gói - Gunny Private</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: #161b22; padding: 25px; border-radius: 10px; border: 1px solid #30363d; box-shadow: 0 0 15px rgba(0,255,0,0.1); }
        h2 { text-align: center; color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-top: 0; }
        .form-group { display: flex; justify-content: space-between; margin-top: 15px; }
        .form-group div { width: 48%; }
        label { display: block; font-weight: bold; color: #8b949e; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 10px; background: #010409; color: #58a6ff; border: 1px solid #30363d; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: #58a6ff; }
        .full-width { margin-top: 15px; }
        button { margin-top: 25px; width: 100%; padding: 15px; background: #238636; color: white; border: none; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #2ea043; }
        button:disabled { background: #444; cursor: not-allowed; color: #888; }
        #logArea { margin-top: 25px; background: #010409; height: 250px; overflow-y: auto; padding: 15px; border: 1px solid #30363d; border-radius: 5px; font-size: 13px; line-height: 1.5; }
        .success { color: #3fb950; }
        .error { color: #f85149; }
        .info { color: #d2a8ff; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 TOOL AUTO BUY PACKS</h2>
    
    <div class="form-group">
        <div>
            <label>Nhân vật (Name):</label>
            <input type="text" id="txtName" placeholder="VD: acechuon93" value="acechuon93">
        </div>
        <div>
            <label>Server ID:</label>
            <input type="text" id="txtServer" placeholder="VD: 36" value="36">
        </div>
    </div>

    <div class="form-group">
        <div>
            <label>Role ID:</label>
            <input type="text" id="txtRole" placeholder="VD: 281" value="281">
        </div>
        <div>
            <label>Số lượng gói cần mua:</label>
            <input type="number" id="txtAmount" value="100" min="1" max="1000">
        </div>
    </div>

    <div class="full-width">
        <label>Mã Cookie (PHPSESSID):</label>
        <input type="text" id="txtCookie" placeholder="VD: PHPSESSID=bskoh80nq21rlulqpakotjdaq6">
    </div>

    <button onclick="startAutoBuy()" id="btnBuy">🔥 TIẾN HÀNH MUA</button>

    <div id="logArea"></div>
</div>

<script>
    async function startAutoBuy() {
        const name = document.getElementById('txtName').value.trim();
        const role = document.getElementById('txtRole').value.trim();
        let server = document.getElementById('txtServer').value.trim();
        const cookie = document.getElementById('txtCookie').value.trim();
        const totalPacks = parseInt(document.getElementById('txtAmount').value) || 100;
        const logArea = document.getElementById('logArea');
        const btnBuy = document.getElementById('btnBuy');

        if (!cookie) {
            alert("Vui lòng dán mã Cookie vào!");
            return;
        }

        if (!server.startsWith("local_")) server = "local_" + server;

        btnBuy.disabled = true;
        btnBuy.innerText = "⏳ ĐANG CHẠY... VUI LÒNG ĐỢI";
        logArea.innerHTML = `<div class="info">[*] Khởi động quá trình mua ${totalPacks} gói cho ${name}...</div>`;

        // URL của game (HTTP)
        const baseUrl = "http://nhangiatruyenky.com:126/api.php/pf/sygame/pay_web/";

        for (let i = 1; i <= totalPacks; i++) {
            // Nhồi thông số vào URL (Có nhồi cả Cookie dạng params phòng trường hợp Server PHP hỗ trợ)
            const queryParams = new URLSearchParams({
                srv_id: server,
                role_id: role,
                money: "1",
                name: name,
                productId: "7"
            });
            
            const targetUrl = `${baseUrl}?${queryParams.toString()}`;
            
            // DÙNG CORS PROXY ĐỂ LÁCH LUẬT HTTPS (Mixed Content) CỦA GITHUB
            const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);

            try {
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': '*/*',
                        // Ép trình duyệt gửi Cookie qua header (Một số trình duyệt có thể cảnh báo)
                        'Cookie': cookie
                    }
                });

                if (response.ok) {
                    const text = await response.text();
                    logArea.innerHTML += `<div class="success">[${i}/${totalPacks}] ✔️ Phản hồi: ${text}</div>`;
                } else {
                    logArea.innerHTML += `<div class="error">[${i}/${totalPacks}] ❌ Lỗi HTTP: ${response.status}</div>`;
                }
            } catch (error) {
                logArea.innerHTML += `<div class="error">[${i}/${totalPacks}] ❌ Lỗi kết nối: ${error.message}</div>`;
            }

            // Tự động cuộn khung log xuống dòng cuối cùng
            logArea.scrollTop = logArea.scrollHeight;
            
            // Nghỉ 500ms để tránh bị server chặn IP
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        btnBuy.disabled = false;
        btnBuy.innerText = "🔥 MUA LẠI LẦN NỮA";
        logArea.innerHTML += `<div class="info">[*] === HOÀN TẤT ===</div>`;
    }
</script>

</body>
</html>
